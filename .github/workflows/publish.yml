name: Publish to crates.io
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  publish-crates:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth
      - name: Publish ic-cycles-ledger-client
        run: cargo publish -p ic-cycles-ledger-client
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Wait for crates.io index update
        run: sleep 30
      - name: Publish ic-papi-api
        run: cargo publish -p ic-papi-api
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Wait for crates.io index update
        run: sleep 30
      - name: Publish ic-papi-guard
        run: cargo publish -p ic-papi-guard
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Wait for crates.io index update
        run: sleep 30
      - name: Publish ic-papi
        run: cargo publish -p ic-papi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
