name: Publish to crates.io
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  publish-crates:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1.0.3
        id: auth
      - name: Publish ic-cycles-ledger-client
        run: cargo publish -p ic-cycles-ledger-client
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Wait for crates.io index update
        run: sleep 30
      - name: Publish ic-papi-api
        run: cargo publish -p ic-papi-api
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Wait for crates.io index update
        run: sleep 30
      - name: Publish ic-papi-guard
        run: cargo publish -p ic-papi-guard
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Wait for crates.io index update
        run: sleep 30
      - name: Publish ic-papi
        run: cargo publish -p ic-papi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
